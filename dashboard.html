<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rosemary Staff Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #f0f0f0;
      min-height: 100vh;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 28px;
      border-bottom: 1px solid #2a2a2a;
      background: #0f0f0f;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .brand { display: flex; align-items: center; gap: 12px; }
    .brand-mark {
      width: 36px; height: 36px;
      border-radius: 10px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; font-weight: 700; letter-spacing: -0.5px; color: #fff;
    }
    .brand-name   { font-size: 16px; font-weight: 600; color: #f0f0f0; }
    .brand-kicker { font-size: 11px; color: #555; margin-top: 1px; }
    .header-right { display: flex; align-items: center; gap: 14px; }
    #last-updated { font-size: 12px; color: #555; }
    .refresh-btn {
      background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 8px;
      color: #888; padding: 7px 14px; font-size: 13px;
      font-family: inherit; cursor: pointer; transition: background 0.15s, color 0.15s;
    }
    .refresh-btn:hover { background: #222; color: #f0f0f0; border-color: #3a3a3a; }

    /* ── Page ── */
    .page { max-width: 1080px; margin: 0 auto; padding: 32px 28px 64px; }

    /* ── Sections ── */
    .section { margin-bottom: 40px; }
    .section-title {
      font-size: 11px; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: #555; margin-bottom: 16px;
      padding-bottom: 10px; border-bottom: 1px solid #1e1e1e;
      display: flex; align-items: center; gap: 10px;
    }
    .section-count {
      background: #1a1a1a; border: 1px solid #2a2a2a;
      border-radius: 999px; padding: 2px 9px;
      font-size: 11px; color: #666; letter-spacing: 0; text-transform: none;
    }

    /* ── PTO cards ── */
    .pto-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
      gap: 12px;
    }
    .pto-card {
      background: #1a1a1a; border: 1px solid #2a2a2a;
      border-radius: 12px; padding: 18px 16px;
      cursor: pointer; transition: background 0.15s, border-color 0.15s;
    }
    .pto-card:hover { background: #222; border-color: #3a3a3a; }
    .pto-card-name {
      font-size: 15px; font-weight: 600; color: #f0f0f0; margin-bottom: 10px;
    }
    .pto-days {
      font-size: 34px; font-weight: 700; color: #f0f0f0;
      line-height: 1; margin-bottom: 2px;
    }
    .pto-label {
      font-size: 11px; color: #555;
      text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 12px;
    }
    .pto-bar-wrap {
      background: #2a2a2a; border-radius: 4px;
      height: 3px; overflow: hidden; margin-bottom: 6px;
    }
    .pto-bar       { height: 3px; border-radius: 4px; background: #888; transition: width 0.4s; }
    .pto-bar.warn  { background: #b9923e; }
    .pto-bar.over  { background: #b24a3a; }
    .pto-hint      { font-size: 11px; color: #555; }
    .pto-detail {
      margin-top: 14px; padding-top: 12px;
      border-top: 1px solid #2a2a2a; display: none;
    }
    .pto-detail.open { display: block; }
    .pto-detail-row {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 12px; color: #888; padding: 5px 0;
      border-bottom: 1px solid #1f1f1f; gap: 8px;
    }
    .pto-detail-row:last-child { border-bottom: none; }

    /* ── Tables ── */
    .table-wrap {
      background: #1a1a1a; border: 1px solid #2a2a2a;
      border-radius: 12px; overflow: hidden;
    }
    .data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .data-table th {
      text-align: left; padding: 10px 16px;
      background: #141414; color: #555;
      font-size: 10px; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      border-bottom: 1px solid #2a2a2a;
    }
    .data-table td {
      padding: 12px 16px; border-bottom: 1px solid #1f1f1f;
      color: #c0c0c0; vertical-align: top;
    }
    .data-table tr:last-child td { border-bottom: none; }
    .data-table tr:hover td { background: #1f1f1f; }
    .data-table td strong { color: #f0f0f0; font-weight: 600; }

    /* ── Badges ── */
    .badge {
      display: inline-flex; align-items: center;
      padding: 2px 9px; border-radius: 999px;
      font-size: 10px; font-weight: 700;
      letter-spacing: 0.06em; text-transform: uppercase; white-space: nowrap;
    }
    .badge-pending   { background: #2d2200; color: #b9923e; border: 1px solid #4d3800; }
    .badge-approved  { background: #0e2010; color: #5a8a5e; border: 1px solid #1e4020; }
    .badge-rejected  { background: #2a1010; color: #b24a3a; border: 1px solid #4f1e1e; }
    .badge-submitted { background: #0e2010; color: #5a8a5e; border: 1px solid #1e4020; }
    .badge-yes       { background: #0e2010; color: #5a8a5e; border: 1px solid #1e4020; }
    .badge-no        { background: #2a1010; color: #b24a3a; border: 1px solid #4f1e1e; }

    /* ── Report status grid ── */
    .emp-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
      gap: 12px;
    }
    .emp-card {
      background: #1a1a1a; border: 1px solid #2a2a2a;
      border-radius: 12px; padding: 18px 16px;
    }
    .emp-name { font-size: 15px; font-weight: 600; color: #f0f0f0; margin-bottom: 10px; }
    .emp-row {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 12px; color: #666; margin-bottom: 7px;
    }
    .emp-row:last-child { margin-bottom: 0; }

    /* ── Month tabs ── */
    .month-tabs { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 18px; }
    .month-tab {
      padding: 6px 16px; border-radius: 8px;
      font-size: 13px; font-weight: 500; cursor: pointer;
      border: 1px solid #2a2a2a; background: #1a1a1a; color: #888;
      font-family: inherit; transition: all 0.15s;
    }
    .month-tab:hover   { background: #222; border-color: #3a3a3a; color: #f0f0f0; }
    .month-tab.active  { background: #222; border-color: #3a3a3a; color: #f0f0f0; font-weight: 600; }

    .report-panels { display: flex; flex-direction: column; gap: 24px; }
    .report-panel-title {
      font-size: 11px; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: #555; margin-bottom: 10px;
    }

    /* ── Empty / loading ── */
    .empty-row td {
      text-align: center; color: #444;
      padding: 32px; font-style: italic;
    }
    .loading-overlay {
      text-align: center; padding: 80px 0;
      color: #444; font-size: 14px;
      animation: pulse 1.4s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .error-msg {
      background: #1a0a0a; border: 1px solid #3a1010;
      border-radius: 12px; padding: 20px;
      color: #b24a3a; font-size: 14px; text-align: center;
    }
    .truncate {
      max-width: 200px; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis;
    }
  </style>
</head>
<body>

<div class="header">
  <div class="brand">
    <img src="rosemary-logo.jpg" alt="Rosemary Villas at Chenal" style="height:32px;width:auto;border-radius:6px;display:block;">
    <div style="margin-left:12px;">
      <div class="brand-name">Rosemary Staff</div>
      <div class="brand-kicker">Admin Dashboard</div>
    </div>
  </div>
  <div class="header-right">
    <span id="last-updated"></span>
    <button class="refresh-btn" onclick="loadDashboard()">↺ Refresh</button>
  </div>
</div>

<div class="page">
  <div id="main-content">
    <div class="loading-overlay">Loading dashboard…</div>
  </div>
</div>

<script>
  const WEB_APP_URL         = 'https://script.google.com/macros/s/AKfycbwKeQ-t3eEOAA86rx4lU3z-O18-XngIKt6kUCVXUuwKhRP8b1no8FNOP-lEFTSW28gJ/exec';
  const REFRESH_INTERVAL_MS = 5 * 60 * 1000;
  const EMPLOYEES           = ['Austin', 'Jaimie', 'Lindsey', 'Nathan'];
  const PTO_ANNUAL_DAYS     = 10;

  let _data        = null;
  let _activeMonth = null;

  function esc(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function fmtDate(s) {
    if (!s || s==='undefined') return '—';
    const d = new Date(s + (s.length===10 ? 'T00:00:00' : ''));
    if (isNaN(d)) return s;
    return d.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
  }
  function fmtMonth(key) {
    const [y,m] = key.split('-');
    return new Date(+y,+m-1,1).toLocaleDateString('en-US', { month:'long', year:'numeric' });
  }
  function badge(text, cls) { return `<span class="badge badge-${cls}">${esc(text)}</span>`; }
  function badgeStatus(s) {
    const l = (s||'').toLowerCase();
    if (l==='approved') return badge('Approved','approved');
    if (l==='rejected') return badge('Rejected','rejected');
    return badge('Pending','pending');
  }

  // ── PTO tracker ───────────────────────────────────────────────
  function renderPTOTracker(ptoByEmployee) {
    return '<div class="pto-grid">' + EMPLOYEES.map(emp => {
      const info = (ptoByEmployee&&ptoByEmployee[emp]) || {days:0,requests:[]};
      const days = info.days||0;
      const pct  = Math.min(100, Math.round(days/PTO_ANNUAL_DAYS*100));
      const cls  = pct>=100 ? 'over' : pct>=80 ? 'warn' : '';
      const reqs = info.requests||[];
      const rows = reqs.length
        ? reqs.map(r=>`
            <div class="pto-detail-row">
              <span>${esc(fmtDate(r.startDate))} – ${esc(fmtDate(r.endDate))}</span>
              <span style="display:flex;align-items:center;gap:6px">
                <span style="color:#666">${r.days}d · ${esc(r.type)}</span>
                ${badgeStatus(r.status)}
              </span>
            </div>`).join('')
        : '<div style="font-size:12px;color:#444;padding:4px 0">No PTO this year</div>';
      return `
        <div class="pto-card" onclick="togglePTO('${esc(emp)}')">
          <div class="pto-card-name">${esc(emp)}</div>
          <div class="pto-days">${days}</div>
          <div class="pto-label">days used · ${new Date().getFullYear()}</div>
          <div class="pto-bar-wrap"><div class="pto-bar ${cls}" style="width:${pct}%"></div></div>
          <div class="pto-hint">${days} of ${PTO_ANNUAL_DAYS} days (${pct}%)</div>
          <div class="pto-detail" id="pto-d-${esc(emp)}">${rows}</div>
        </div>`;
    }).join('') + '</div>';
  }

  function togglePTO(emp) {
    const el = document.getElementById('pto-d-'+emp);
    if (el) el.classList.toggle('open');
  }

  // ── Pending PTO ───────────────────────────────────────────────
  function renderPendingPTO(list) {
    const thead = '<thead><tr><th>Employee</th><th>Start</th><th>End</th><th>Type</th><th>Notes</th><th>Status</th></tr></thead>';
    if (!list||!list.length) {
      return `<div class="table-wrap"><table class="data-table">${thead}<tbody><tr class="empty-row"><td colspan="6">No pending PTO requests 🎉</td></tr></tbody></table></div>`;
    }
    const rows = list.map(r=>`<tr>
      <td><strong>${esc(r.employee)}</strong></td>
      <td>${esc(fmtDate(r.startDate))}</td>
      <td>${esc(fmtDate(r.endDate))}</td>
      <td>${esc(r.type)}</td>
      <td class="truncate" title="${esc(r.notes)}">${esc(r.notes)||'<span style="color:#444">—</span>'}</td>
      <td>${badgeStatus(r.status)}</td>
    </tr>`).join('');
    return `<div class="table-wrap"><table class="data-table">${thead}<tbody>${rows}</tbody></table></div>`;
  }

  // ── Report status ─────────────────────────────────────────────
  function renderReportStatus(weekly, monthly) {
    return '<div class="emp-grid">' + EMPLOYEES.map(emp=>`
      <div class="emp-card">
        <div class="emp-name">${esc(emp)}</div>
        <div class="emp-row"><span>Weekly Report</span>${weekly&&weekly[emp]?badge('Submitted','yes'):badge('Missing','no')}</div>
        <div class="emp-row"><span>Monthly Report</span>${monthly&&monthly[emp]?badge('Submitted','yes'):badge('Missing','no')}</div>
      </div>`).join('') + '</div>';
  }

  // ── Month drill-down ─────────────────────────────────────────
  function renderMonthSection(reportsByMonth) {
    const months = Object.keys(reportsByMonth||{}).sort().reverse();
    if (!months.length) return '<p style="color:#444;padding:16px 0;font-size:13px">No reports submitted yet.</p>';
    if (!_activeMonth||!reportsByMonth[_activeMonth]) _activeMonth = months[0];
    const tabs = months.map(m=>`<button class="month-tab ${m===_activeMonth?'active':''}" onclick="selectMonth('${m}')">${fmtMonth(m)}</button>`).join('');
    return `<div class="month-tabs">${tabs}</div><div id="month-panel">${renderMonthPanel(reportsByMonth[_activeMonth]||{})}</div>`;
  }

  function selectMonth(key) {
    if (!_data) return;
    _activeMonth = key;
    document.querySelectorAll('.month-tab').forEach(t => t.classList.toggle('active', t.textContent.trim()===fmtMonth(key)));
    document.getElementById('month-panel').innerHTML = renderMonthPanel((_data.reportsByMonth||{})[key]||{});
  }

  function renderMonthPanel(d) {
    const w = d.weekly||[], m = d.monthly||[];

    function weeklyTable() {
      const thead = '<thead><tr><th>Employee</th><th>Week Ending</th><th>Tasks Completed</th><th>Feedback</th></tr></thead>';
      if (!w.length) return `<div class="table-wrap"><table class="data-table">${thead}<tbody><tr class="empty-row"><td colspan="4">No weekly reports this month</td></tr></tbody></table></div>`;
      return `<div class="table-wrap"><table class="data-table">${thead}<tbody>${w.map(r=>`<tr>
        <td><strong>${esc(r.employee)}</strong></td>
        <td>${esc(fmtDate(r.weekEnding))}</td>
        <td class="truncate" title="${esc(r.tasks)}">${esc(r.tasks)||'—'}</td>
        <td class="truncate" title="${esc(r.feedback)}">${esc(r.feedback)||'—'}</td>
      </tr>`).join('')}</tbody></table></div>`;
    }

    function monthlyTable() {
      const thead = '<thead><tr><th>Employee</th><th>Month</th><th>Tasks Completed</th><th>Feedback</th></tr></thead>';
      if (!m.length) return `<div class="table-wrap"><table class="data-table">${thead}<tbody><tr class="empty-row"><td colspan="4">No monthly reports this month</td></tr></tbody></table></div>`;
      return `<div class="table-wrap"><table class="data-table">${thead}<tbody>${m.map(r=>`<tr>
        <td><strong>${esc(r.employee)}</strong></td>
        <td>${esc(r.month)}</td>
        <td class="truncate" title="${esc(r.tasks)}">${esc(r.tasks)||'—'}</td>
        <td class="truncate" title="${esc(r.feedback)}">${esc(r.feedback)||'—'}</td>
      </tr>`).join('')}</tbody></table></div>`;
    }

    return `<div class="report-panels">
      <div><div class="report-panel-title">Weekly Reports (${w.length})</div>${weeklyTable()}</div>
      <div><div class="report-panel-title">Monthly Reports (${m.length})</div>${monthlyTable()}</div>
    </div>`;
  }

  // ── Main render ───────────────────────────────────────────────
  function renderDashboard(data) {
    _data = data;
    document.getElementById('last-updated').textContent =
      'Updated ' + new Date().toLocaleTimeString('en-US', {hour:'numeric',minute:'2-digit'});

    document.getElementById('main-content').innerHTML = `
      <div class="section">
        <div class="section-title">PTO Tracker — ${new Date().getFullYear()} <span style="font-size:10px;color:#444;text-transform:none;letter-spacing:0;font-weight:400">click to expand</span></div>
        ${renderPTOTracker(data.ptoByEmployee)}
      </div>
      <div class="section">
        <div class="section-title">Pending PTO <span class="section-count">${(data.pendingPTO||[]).length}</span></div>
        ${renderPendingPTO(data.pendingPTO)}
      </div>
      <div class="section">
        <div class="section-title">Report Status — This Period</div>
        ${renderReportStatus(data.weeklyStatus, data.monthlyStatus)}
      </div>
      <div class="section">
        <div class="section-title">Reports by Month</div>
        ${renderMonthSection(data.reportsByMonth)}
      </div>
    `;
  }

  function renderError(msg) {
    document.getElementById('main-content').innerHTML = `<div class="error-msg">⚠️ ${esc(msg)}</div>`;
  }

  async function loadDashboard() {
    try {
      const res  = await fetch(WEB_APP_URL + '?action=getDetailedDashboard');
      const data = await res.json();
      if (!data.success) throw new Error(data.error||'Unknown error');
      renderDashboard(data);
    } catch(err) {
      renderError('Could not load dashboard: ' + err.message);
    }
  }

  loadDashboard();
  setInterval(loadDashboard, REFRESH_INTERVAL_MS);
</script>
</body>
</html>
